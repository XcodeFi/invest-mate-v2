services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__MongoDb=${ConnectionStrings__MongoDb}
      - MongoDb__DatabaseName=${MongoDb__DatabaseName}
      - Jwt__Key=${Jwt__Key}
      - Jwt__Issuer=${Jwt__Issuer:-InvestmentApp}
      - Jwt__Audience=${Jwt__Audience:-InvestmentAppUsers}
      - Jwt__ExpiryInMinutes=${Jwt__ExpiryInMinutes:-60}
      - GoogleOAuth__ClientId=${GoogleOAuth__ClientId}
      - GoogleOAuth__ClientSecret=${GoogleOAuth__ClientSecret}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - DOTNET_ENVIRONMENT=Production
      - ConnectionStrings__MongoDb=${ConnectionStrings__MongoDb}
      - MongoDb__DatabaseName=${MongoDb__DatabaseName}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    restart: unless-stopped
    depends_on:
      - api
