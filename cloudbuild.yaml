# ============================================
# Cloud Build CI/CD Pipeline cho Cloud Run
# ============================================
# Trigger: Tự động chạy khi push code lên branch main
#
# Setup:
#   1. Enable APIs:
#      gcloud services enable cloudbuild.googleapis.com run.googleapis.com secretmanager.googleapis.com
#
#   2. Tạo secrets trong Secret Manager:
#      echo -n "mongodb+srv://..." | gcloud secrets create mongo-connection-string --data-file=-
#      echo -n "InvestMateDb"      | gcloud secrets create mongo-database-name --data-file=-
#      echo -n "your-jwt-key"      | gcloud secrets create jwt-key --data-file=-
#      echo -n "your-client-id"    | gcloud secrets create google-oauth-client-id --data-file=-
#      echo -n "your-client-secret"| gcloud secrets create google-oauth-client-secret --data-file=-
#
#   3. Cấp quyền cho Cloud Build service account:
#      PROJECT_NUMBER=$(gcloud projects describe $PROJECT_ID --format='value(projectNumber)')
#      gcloud projects add-iam-policy-binding $PROJECT_ID \
#        --member="serviceAccount:${PROJECT_NUMBER}@cloudbuild.gserviceaccount.com" \
#        --role="roles/run.admin"
#      gcloud projects add-iam-policy-binding $PROJECT_ID \
#        --member="serviceAccount:${PROJECT_NUMBER}@cloudbuild.gserviceaccount.com" \
#        --role="roles/iam.serviceAccountUser"
#      gcloud projects add-iam-policy-binding $PROJECT_ID \
#        --member="serviceAccount:${PROJECT_NUMBER}@cloudbuild.gserviceaccount.com" \
#        --role="roles/secretmanager.secretAccessor"
#
#   4. Tạo trigger:
#      gcloud builds triggers create github \
#        --repo-name=invest-mate-v2 \
#        --repo-owner=XcodeFi \
#        --branch-pattern="^main$" \
#        --build-config=cloudbuild.yaml
# ============================================

substitutions:
  _REGION: asia-southeast1
  _API_SERVICE: invest-mate-api
  _WORKER_SERVICE: invest-mate-worker
  _FRONTEND_SERVICE: invest-mate-frontend

steps:
  # ========== BUILD ALL IMAGES IN PARALLEL ==========

  # ---- Build API image ----
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_API_SERVICE}:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_API_SERVICE}:latest'
      - '-f'
      - 'Dockerfile.api'
      - '.'
    id: 'build-api'

  # ---- Build Worker image ----
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_WORKER_SERVICE}:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_WORKER_SERVICE}:latest'
      - '-f'
      - 'Dockerfile.worker'
      - '.'
    id: 'build-worker'
    waitFor: ['-']  # Song song với build-api

  # ---- Build Frontend image ----
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:latest'
      - '-f'
      - 'frontend/Dockerfile'
      - './frontend'
    id: 'build-frontend'
    waitFor: ['-']  # Song song với build-api

  # ========== PUSH ALL IMAGES ==========

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/${_API_SERVICE}:$COMMIT_SHA']
    id: 'push-api'
    waitFor: ['build-api']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/${_API_SERVICE}:latest']
    waitFor: ['build-api']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/${_WORKER_SERVICE}:$COMMIT_SHA']
    id: 'push-worker'
    waitFor: ['build-worker']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/${_WORKER_SERVICE}:latest']
    waitFor: ['build-worker']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:$COMMIT_SHA']
    id: 'push-frontend'
    waitFor: ['build-frontend']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:latest']
    waitFor: ['build-frontend']

  # ========== DEPLOY TO CLOUD RUN ==========

  # ---- Deploy API ----
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_API_SERVICE}'
      - '--image=gcr.io/$PROJECT_ID/${_API_SERVICE}:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--max-instances=10'
      - '--min-instances=0'
      - '--concurrency=80'
      - '--allow-unauthenticated'
      - '--set-env-vars=ASPNETCORE_ENVIRONMENT=Production'
      - '--set-secrets=ConnectionStrings__MongoDb=mongo-connection-string:latest'
      - '--set-secrets=MongoDb__DatabaseName=mongo-database-name:latest'
      - '--set-secrets=Jwt__Key=jwt-key:latest'
      - '--set-secrets=Jwt__Issuer=jwt-issuer:latest'
      - '--set-secrets=Jwt__Audience=jwt-audience:latest'
      - '--set-secrets=GoogleOAuth__ClientId=google-oauth-client-id:latest'
      - '--set-secrets=GoogleOAuth__ClientSecret=google-oauth-client-secret:latest'
    id: 'deploy-api'
    waitFor: ['push-api']

  # ---- Deploy Worker (always-on, no external traffic) ----
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_WORKER_SERVICE}'
      - '--image=gcr.io/$PROJECT_ID/${_WORKER_SERVICE}:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--max-instances=1'
      - '--min-instances=1'
      - '--no-allow-unauthenticated'
      - '--no-cpu-throttling'
      - '--set-env-vars=DOTNET_ENVIRONMENT=Production'
      - '--set-secrets=ConnectionStrings__MongoDb=mongo-connection-string:latest'
      - '--set-secrets=MongoDb__DatabaseName=mongo-database-name:latest'
    id: 'deploy-worker'
    waitFor: ['push-worker']

  # ---- Deploy Frontend ----
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_FRONTEND_SERVICE}'
      - '--image=gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--port=80'
      - '--memory=128Mi'
      - '--cpu=1'
      - '--max-instances=5'
      - '--min-instances=0'
      - '--concurrency=200'
      - '--allow-unauthenticated'
    id: 'deploy-frontend'
    waitFor: ['push-frontend']

images:
  - 'gcr.io/$PROJECT_ID/${_API_SERVICE}:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/${_API_SERVICE}:latest'
  - 'gcr.io/$PROJECT_ID/${_WORKER_SERVICE}:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/${_WORKER_SERVICE}:latest'
  - 'gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:latest'

timeout: '1200s'

options:
  logging: CLOUD_LOGGING_ONLY
