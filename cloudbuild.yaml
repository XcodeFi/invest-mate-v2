# ============================================
# Cloud Build CI/CD Pipeline cho Cloud Run
# ============================================
# Trigger: Tự động chạy khi push code lên branch main
#
# Setup:
#   1. Enable APIs:
#      gcloud services enable cloudbuild.googleapis.com run.googleapis.com secretmanager.googleapis.com cloudscheduler.googleapis.com
#
#   2. Tạo secrets trong Secret Manager:
#      echo -n "mongodb+srv://..." | gcloud secrets create mongo-connection-string --data-file=-
#      echo -n "InvestMateDb"      | gcloud secrets create mongo-database-name --data-file=-
#      echo -n "your-jwt-key"      | gcloud secrets create jwt-key --data-file=-
#      echo -n "your-client-id"    | gcloud secrets create google-oauth-client-id --data-file=-
#      echo -n "your-client-secret"| gcloud secrets create google-oauth-client-secret --data-file=-
#
#   3. Cấp quyền cho Cloud Build service account:
#      PROJECT_NUMBER=$(gcloud projects describe $PROJECT_ID --format='value(projectNumber)')
#      gcloud projects add-iam-policy-binding $PROJECT_ID \
#        --member="serviceAccount:${PROJECT_NUMBER}@cloudbuild.gserviceaccount.com" \
#        --role="roles/run.admin"
#      gcloud projects add-iam-policy-binding $PROJECT_ID \
#        --member="serviceAccount:${PROJECT_NUMBER}@cloudbuild.gserviceaccount.com" \
#        --role="roles/iam.serviceAccountUser"
#      gcloud projects add-iam-policy-binding $PROJECT_ID \
#        --member="serviceAccount:${PROJECT_NUMBER}@cloudbuild.gserviceaccount.com" \
#        --role="roles/secretmanager.secretAccessor"
#
#   4. Tạo trigger:
#      gcloud builds triggers create github \
#        --repo-name=invest-mate-v2 \
#        --repo-owner=XcodeFi \
#        --branch-pattern="^main$" \
#        --build-config=cloudbuild.yaml
#
#   5. Cron jobs (one-time setup, see docs/plans/done/worker-to-scheduler-migration.md):
#      Create scheduler service account + grant run.invoker, then:
#        gcloud scheduler jobs create http invest-mate-prices \
#          --schedule="*/15 2-7 * * 1-5" --time-zone="UTC" \
#          --uri="${API_URL}/internal/jobs/prices" --http-method=POST \
#          --oidc-service-account-email=${SCHEDULER_SA} \
#          --oidc-token-audience="${API_URL}"
#      (repeat for snapshot + exchange-rate + scenario-eval)
#
#      Then update API env vars with the SA email + audience:
#        gcloud run services update invest-mate-api --region=${_REGION} \
#          --update-env-vars=Jobs__AllowedSchedulerSAs=${SCHEDULER_SA},Jobs__ExpectedAudience=${API_URL}
# ============================================

substitutions:
  _REGION: asia-southeast1
  _API_SERVICE: invest-mate-api
  _FRONTEND_SERVICE: invest-mate-frontend

steps:
  # ========== BUILD ALL IMAGES IN PARALLEL ==========

  # ---- Build API image ----
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'APP_VERSION=$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_API_SERVICE}:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_API_SERVICE}:latest'
      - '-f'
      - 'Dockerfile.api'
      - '.'
    id: 'build-api'

  # ---- Build Frontend image ----
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:latest'
      - '-f'
      - 'frontend/Dockerfile'
      - './frontend'
    id: 'build-frontend'
    waitFor: ['-']  # Song song với build-api

  # ========== PUSH ALL IMAGES ==========

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/${_API_SERVICE}:$COMMIT_SHA']
    id: 'push-api'
    waitFor: ['build-api']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/${_API_SERVICE}:latest']
    waitFor: ['build-api']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:$COMMIT_SHA']
    id: 'push-frontend'
    waitFor: ['build-frontend']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:latest']
    waitFor: ['build-frontend']

  # ========== DEPLOY TO CLOUD RUN ==========

  # ---- Deploy API ----
  # --no-cpu-throttling keeps CPU allocated even between requests so the
  # in-process BacktestQueueService can drain its channel; still free-tier-friendly
  # because min-instances=0 and the API only runs while a request is active or a
  # backtest is being processed.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_API_SERVICE}'
      - '--image=gcr.io/$PROJECT_ID/${_API_SERVICE}:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--max-instances=10'
      - '--min-instances=0'
      - '--no-cpu-throttling'
      - '--concurrency=80'
      - '--allow-unauthenticated'
      - '--set-env-vars=ASPNETCORE_ENVIRONMENT=Production'
      - '--set-secrets=ConnectionStrings__MongoDb=mongo-connection-string:latest'
      - '--set-secrets=MongoDb__DatabaseName=mongo-database-name:latest'
      - '--set-secrets=Jwt__Key=jwt-key:latest'
      - '--set-secrets=Jwt__Issuer=jwt-issuer:latest'
      - '--set-secrets=Jwt__Audience=jwt-audience:latest'
      - '--set-secrets=GoogleOAuth__ClientId=google-oauth-client-id:latest'
      - '--set-secrets=GoogleOAuth__ClientSecret=google-oauth-client-secret:latest'
    id: 'deploy-api'
    waitFor: ['push-api']

  # ---- Deploy Frontend ----
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_FRONTEND_SERVICE}'
      - '--image=gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--port=80'
      - '--memory=128Mi'
      - '--cpu=1'
      - '--max-instances=5'
      - '--min-instances=0'
      - '--concurrency=200'
      - '--allow-unauthenticated'
    id: 'deploy-frontend'
    waitFor: ['push-frontend']

images:
  - 'gcr.io/$PROJECT_ID/${_API_SERVICE}:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/${_API_SERVICE}:latest'
  - 'gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:latest'

timeout: '1200s'

options:
  logging: CLOUD_LOGGING_ONLY
