services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__MongoDb=${ConnectionStrings__MongoDb}
      - MongoDb__DatabaseName=${MongoDb__DatabaseName}
      - Jwt__Key=${Jwt__Key}
      - Jwt__Issuer=${Jwt__Issuer:-InvestmentApp}
      - Jwt__Audience=${Jwt__Audience:-InvestmentAppUsers}
      - Jwt__ExpiryInMinutes=${Jwt__ExpiryInMinutes:-60}
      - GoogleOAuth__ClientId=${GoogleOAuth__ClientId}
      - GoogleOAuth__ClientSecret=${GoogleOAuth__ClientSecret}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "dotnet --list-runtimes > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - DOTNET_ENVIRONMENT=Development
      - ConnectionStrings__MongoDb=${ConnectionStrings__MongoDb}
      - MongoDb__DatabaseName=${MongoDb__DatabaseName}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NG_CONFIG: development
    ports:
      - "4200:80"
    restart: unless-stopped
    depends_on:
      - api
